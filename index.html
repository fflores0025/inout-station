<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut Station</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    /* ═══════════════════════════════════════════════════════════
       ESTILOS GLOBALES
    ═══════════════════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f;--surf:#0d0d1a;--card:#111120;--border:#1c1c2e;
      --a1:#c8ff00;--a2:#ff3cac;--a3:#00d4ff;
      --txt:#e6e6f0;--muted:#60607a;
      --success:#00e676;--danger:#ff1744;--warn:#ffab00;
      --r:16px;--r-sm:12px;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--txt);background:var(--bg);overflow:hidden;touch-action:manipulation;user-select:none;-webkit-font-smoothing:antialiased;}
    
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
    
    .screen{display:none;width:100%;max-width:450px;}
    .screen.active{display:flex;flex-direction:column;align-items:center;}
    
    .station-logo{text-align:center;margin-bottom:48px;}
    .station-logo .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .station-logo .sub{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-top:10px;}
    
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:100%;}
    .card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;text-align:center;}
    .card-subtitle{font-size:14px;color:var(--muted);margin-bottom:24px;text-align:center;}
    
    .form-input{width:100%;padding:16px;border-radius:var(--r-sm);background:var(--surf);border:2px solid var(--border);color:var(--txt);font-size:18px;text-align:center;font-family:monospace;letter-spacing:2px;outline:none;transition:border-color .15s;-webkit-text-fill-color:var(--txt);margin-bottom:16px;}
    .form-input:focus{border-color:var(--a3);}
    .form-input.error{border-color:var(--danger);}
    
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;transition:all 0.2s;width:100%;min-height:52px;}
    .btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px);}
    .btn:active:not(:disabled){transform:translateY(0);}
    .btn:disabled{opacity:0.4;pointer-events:none;}
    .btn-p{background:var(--a1);color:#000;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
    
    .error-msg{margin-top:12px;padding:12px;border-radius:var(--r-sm);background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);color:var(--danger);font-size:13px;text-align:center;display:none;}
    .error-msg.visible{display:block;}
    
    /* PIN Pad */
    .pin-dots{display:flex;gap:16px;justify-content:center;margin:24px 0 32px;}
    .pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all 0.2s;}
    .pin-dot.filled{background:var(--a1);border-color:var(--a1);}
    .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .pin-key{padding:22px;border-radius:var(--r-sm);background:var(--surf);border:1px solid var(--border);font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--txt);cursor:pointer;transition:all 0.15s;user-select:none;text-align:center;}
    .pin-key:active{background:rgba(200,255,0,0.12);transform:scale(0.94);}
    .pin-key.empty{opacity:0.1;pointer-events:none;}
    
    /* Loading spinner */
    .loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
    .loading-overlay.visible{display:flex;}
    .spinner{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--a1);}
    
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-12px);}75%{transform:translateX(12px);}}
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 1: CÓDIGO DE EMPLEADO
═══════════════════════════════════════════════════════════ -->
<div id="employee-code-screen" class="screen active">
  <div class="station-logo">
    <div class="brand">InOut<span style="color:var(--a1)">.</span>Station</div>
    <div class="sub">Sistema multifunción</div>
  </div>

  <div class="card">
    <div class="card-title">Acceso de empleado</div>
    <div class="card-subtitle">Introduce tu código de empleado</div>
    
    <input 
      id="employee-code-input" 
      type="text" 
      class="form-input"
      placeholder="0208591" 
      maxlength="7"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
      onkeydown="if(event.key==='Enter')STATION.submitEmployeeCode()"
    />
    
    <button class="btn btn-p" onclick="STATION.submitEmployeeCode()">
      Continuar →
    </button>
    
    <div id="code-error" class="error-msg"></div>
    
    <div style="margin-top:16px;padding:12px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:var(--r-sm);font-size:12px;color:var(--muted);text-align:center">
      <strong style="color:var(--a3)">Formato:</strong> XXXYYY<br>
      <span style="font-size:11px">XXX = Código organización | YYY = Número empleado</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 2: PIN DE DESBLOQUEO
═══════════════════════════════════════════════════════════ -->
<div id="pin-screen" class="screen">
  <div class="station-logo">
    <div class="brand">InOut<span style="color:var(--a1)">.</span>Station</div>
    <div class="sub">Sistema multifunción</div>
  </div>

  <div class="card">
    <div class="card-title">PIN de desbloqueo</div>
    <div class="card-subtitle" id="employee-name-display">Introduce tu PIN de 4 dígitos</div>
    
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    
    <div class="pin-pad">
      <div class="pin-key" onclick="STATION.pinKey('1')">1</div>
      <div class="pin-key" onclick="STATION.pinKey('2')">2</div>
      <div class="pin-key" onclick="STATION.pinKey('3')">3</div>
      <div class="pin-key" onclick="STATION.pinKey('4')">4</div>
      <div class="pin-key" onclick="STATION.pinKey('5')">5</div>
      <div class="pin-key" onclick="STATION.pinKey('6')">6</div>
      <div class="pin-key" onclick="STATION.pinKey('7')">7</div>
      <div class="pin-key" onclick="STATION.pinKey('8')">8</div>
      <div class="pin-key" onclick="STATION.pinKey('9')">9</div>
      <div class="pin-key empty"></div>
      <div class="pin-key" onclick="STATION.pinKey('0')">0</div>
      <div class="pin-key" onclick="STATION.pinKey('⌫')">⌫</div>
    </div>
    
    <button class="btn btn-g" style="margin-top:16px" onclick="STATION.goBack()">
      ← Volver
    </button>
    
    <div id="pin-error" class="error-msg"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     LOADING OVERLAY
═══════════════════════════════════════════════════════════ -->
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Redirigiendo...</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATION CONTROLLER - Sistema de código de empleado + PIN
// ═══════════════════════════════════════════════════════════════

const STATION = {
  employeeData: null, // Datos del empleado autenticado
  organizationData: null, // Datos de la organización
  pinBuffer: '',
  supabase: null,
  
  async init() {
    console.log('🚀 InOut Station v4.0 - Employee Code System (XXXYYY)');
    
    // Inicializar Supabase
    this.supabase = supabase.createClient(
      'https://raoxkjnwrccoxjcipfpv.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhb3hram53cmNjb3hqY2lwZnB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzMxNzgsImV4cCI6MjA5MTgwOTE3OH0.dlPG4hpA-ypmGkqrP0ohaiOfMtXq5dpVmV7QNOt7_Qs'
    );
    
    // Auto-focus en el input
    setTimeout(() => document.getElementById('employee-code-input')?.focus(), 100);
    
    console.log('✅ Station initialized');
  },
  
  // ══════════════════════════════════════════════════════════
  //  PASO 1: VALIDAR CÓDIGO DE EMPLEADO (XXXYYY)
  // ══════════════════════════════════════════════════════════
  async submitEmployeeCode() {
    const input = document.getElementById('employee-code-input');
    const errorDiv = document.getElementById('code-error');
    const btn = event?.target;
    
    const code = input.value.trim();
    
    // Validar formato: debe ser 7 dígitos (XXXYYY)
    if (code.length !== 7) {
      this.showError(errorDiv, 'El código debe tener 7 dígitos (XXXYYY)');
      input.classList.add('error');
      return;
    }
    
    // Extraer partes del código
    const orgCode = code.substring(0, 3); // XXX
    const empNum = code.substring(3, 7);   // YYYY
    
    console.log('🔍 Buscando empleado:', { code, orgCode, empNum });
    
    // Desactivar botón
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Verificando...';
    }
    
    try {
      // Buscar en la tabla empleados (sin embedded join para evitar ambigüedad)
      const { data: employee, error: empError } = await this.supabase
        .from('empleados')
        .select('*')
        .eq('codigo_empleado', code)
        .maybeSingle();
      
      if (empError) throw empError;
      
      if (!employee) {
        console.error('❌ Código no encontrado');
        this.showError(errorDiv, 'Código de empleado no válido');
        input.classList.add('error');
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Continuar →';
        }
        return;
      }
      
      // Verificar que tenga PIN
      if (!employee.pin_desbloqueo || employee.pin_desbloqueo.length !== 4) {
        this.showError(errorDiv, 'PIN no configurado para este empleado');
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Continuar →';
        }
        return;
      }
      
      console.log('✅ Empleado encontrado:', employee);
      
      // Guardar datos del empleado
      this.employeeData = employee;
      
      // Si NO tiene organization_id → es SuperAdmin → obtener todas las orgs
      if (!employee.organization_id) {
        console.log('🔑 SuperAdmin detectado - cargará selector de organizaciones');
        this.organizationData = null; // SuperAdmin no tiene org específica
      } else {
        // Obtener la organización específica
        const { data: organization, error: orgError } = await this.supabase
          .from('organizations')
          .select('id, codigo_organizacion, nombre, slug, access_url')
          .eq('id', employee.organization_id)
          .single();
        
        if (orgError || !organization) {
          console.error('❌ Organización no encontrada');
          this.showError(errorDiv, 'Error: organización no encontrada');
          if (btn) {
            btn.disabled = false;
            btn.textContent = 'Continuar →';
          }
          return;
        }
        
        console.log('✅ Organización encontrada:', organization);
        this.organizationData = organization;
      }
      
      // Ir a pantalla de PIN
      this.goToPinScreen();
      
    } catch (err) {
      console.error('❌ Error:', err);
      this.showError(errorDiv, 'Error de conexión. Intenta de nuevo.');
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Continuar →';
      }
    }
  },
  
  // ══════════════════════════════════════════════════════════
  //  NAVEGACIÓN: IR A PANTALLA DE PIN
  // ══════════════════════════════════════════════════════════
  goToPinScreen() {
    document.getElementById('employee-code-screen').classList.remove('active');
    document.getElementById('pin-screen').classList.add('active');
    
    // Mostrar nombre del empleado
    const nameDisplay = document.getElementById('employee-name-display');
    if (this.employeeData.nombre) {
      nameDisplay.textContent = `Empleado: ${this.employeeData.nombre}`;
    } else if (this.employeeData.email) {
      nameDisplay.textContent = `Usuario: ${this.employeeData.email}`;
    } else {
      nameDisplay.textContent = 'Introduce tu PIN de 4 dígitos';
    }
    
    this.pinBuffer = '';
    this.updatePinDots();
  },
  
  goBack() {
    document.getElementById('pin-screen').classList.remove('active');
    document.getElementById('employee-code-screen').classList.add('active');
    
    this.employeeData = null;
    this.organizationData = null;
    this.pinBuffer = '';
    
    // Limpiar input
    const input = document.getElementById('employee-code-input');
    input.value = '';
    input.classList.remove('error');
    
    // Ocultar errores
    document.getElementById('code-error').classList.remove('visible');
    document.getElementById('pin-error').classList.remove('visible');
    
    setTimeout(() => input.focus(), 100);
  },
  
  // ══════════════════════════════════════════════════════════
  //  PASO 2: VALIDAR PIN
  // ══════════════════════════════════════════════════════════
  pinKey(key) {
    const errorDiv = document.getElementById('pin-error');
    errorDiv.classList.remove('visible');
    
    if (key === '⌫') {
      this.pinBuffer = this.pinBuffer.slice(0, -1);
    } else if (this.pinBuffer.length < 4) {
      this.pinBuffer += key;
    }
    
    this.updatePinDots();
    
    if (this.pinBuffer.length === 4) {
      setTimeout(() => this.validatePin(), 150);
    }
  },
  
  updatePinDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('pd' + i);
      if (dot) {
        if (i < this.pinBuffer.length) {
          dot.classList.add('filled');
        } else {
          dot.classList.remove('filled');
        }
      }
    }
  },
  
  async validatePin() {
    const errorDiv = document.getElementById('pin-error');
    
    // Verificar PIN
    if (this.pinBuffer !== this.employeeData.pin_desbloqueo) {
      console.error('❌ PIN incorrecto');
      this.showError(errorDiv, 'PIN incorrecto');
      this.pinBuffer = '';
      this.updatePinDots();
      this.shakeCard();
      return;
    }
    
    console.log('✅ PIN correcto');
    
    // Redirigir directamente (sin registrar clocking)
    this.redirectToOrganization();
  },
  
  // ══════════════════════════════════════════════════════════
  //  REDIRECCIÓN SEGÚN TIPO DE USUARIO
  // ══════════════════════════════════════════════════════════
  redirectToOrganization() {
    const overlay = document.getElementById('loading-overlay');
    const text = document.getElementById('loading-text');
    
    overlay.classList.add('visible');
    
    // SuperAdmin (sin organization_id) → Panel de control
    if (!this.organizationData) {
      text.textContent = 'Acceso SuperAdmin - Redirigiendo a Control...';
      
      setTimeout(() => {
        const url = 'https://control.inout-media.es'; // URL del panel SuperAdmin
        console.log('🔄 SuperAdmin redirect to:', url);
        window.location.href = url;
      }, 1000);
      return;
    }
    
    // Admin/Manager de organización → URL específica de la org
    text.textContent = `Redirigiendo a ${this.organizationData.nombre}...`;
    
    setTimeout(() => {
      // Priorizar access_url, si no existe construir desde slug
      const url = this.organizationData.access_url || 
                  `https://${this.organizationData.slug}.inout-media.es`;
      
      console.log('🔄 Redirecting to:', url);
      window.location.href = url;
    }, 1000);
  },
  
  // ══════════════════════════════════════════════════════════
  //  UTILIDADES
  // ══════════════════════════════════════════════════════════
  showError(element, message) {
    element.textContent = message;
    element.classList.add('visible');
  },
  
  shakeCard() {
    const card = document.querySelector('#pin-screen .card');
    if (card) {
      card.style.animation = 'shake 0.4s ease';
      setTimeout(() => { card.style.animation = ''; }, 400);
    }
  }
};

// Inicializar cuando cargue la página
window.addEventListener('DOMContentLoaded', () => {
  STATION.init();
});

console.log('📦 InOut Station v4.0 loaded');
</script>

</body>
</html>
